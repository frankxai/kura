name: CI

# Validates every PR before merge.
#
# Gates run in order: typecheck → lint → build → playwright.
# All four are BLOCKING — a PR must pass all of them.
#
# Why this exists: Kura is a Chrome MV3 extension that exports user data.
# A bad merge can break content scrapers (silent), corrupt vault output
# (data loss), or ship a manifest that fails Chrome Web Store review.
# Gates prevent regression at the PR layer.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '8.15.1'

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build extension
        run: pnpm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  playwright:
    name: Playwright (real Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Chromium
        run: pnpm exec playwright install chromium --with-deps
      - name: Build extension
        run: pnpm run build
      - name: Run Playwright extension tests
        run: pnpm exec playwright test
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results/
          retention-days: 7

  status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [typecheck, lint, build, playwright]
    if: always()
    steps:
      - name: Aggregate
        run: |
          echo "## Kura CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Typecheck | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Playwright | ${{ needs.playwright.result }} |" >> $GITHUB_STEP_SUMMARY

          ALL_OK=true
          [ "${{ needs.typecheck.result }}" != "success" ] && ALL_OK=false
          [ "${{ needs.lint.result }}" != "success" ] && ALL_OK=false
          [ "${{ needs.build.result }}" != "success" ] && ALL_OK=false
          [ "${{ needs.playwright.result }}" != "success" ] && ALL_OK=false

          if [ "$ALL_OK" = "false" ]; then
            echo "::error::Kura CI had failures — review the gates above"
            exit 1
          fi
          echo "Kura CI PASSED."
